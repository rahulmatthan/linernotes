name: Deploy Legal Site

on:
  push:
    branches: ["main"]
    paths:
      - "legal-site/**"
      - ".github/workflows/pages-legal-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-legal-site"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload legal-site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: legal-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
